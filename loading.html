<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loading Tritha</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at top, rgba(249, 115, 22, 0.22), transparent 32%),
      linear-gradient(180deg, #111827 0%, #0f1117 100%);
    color: #e5e7eb;
  }
  .shell {
    width: min(440px, calc(100vw - 48px));
    padding: 40px 36px;
    border-radius: 24px;
    background: rgba(15, 23, 42, 0.88);
    border: 1px solid rgba(148, 163, 184, 0.18);
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    text-align: center;
  }
  .mark {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    border-radius: 20px;
    background: linear-gradient(135deg, #fb923c, #ea580c);
    display: grid;
    place-items: center;
    font-size: 30px;
    font-weight: 700;
    color: white;
  }
  h1 {
    font-size: 28px;
    margin-bottom: 10px;
    color: #fff;
  }
  p {
    color: #94a3b8;
    font-size: 15px;
    line-height: 1.6;
  }
  .spinner {
    width: 44px;
    height: 44px;
    margin: 26px auto 0;
    border-radius: 50%;
    border: 4px solid rgba(148, 163, 184, 0.22);
    border-top-color: #f97316;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="mark">T</div>
    <h1>Loading Tritha</h1>
    <p>Please wait while the panel connects and the login screen loads.</p>
    <div class="spinner" aria-hidden="true"></div>
  </div>
</body>
</html>
