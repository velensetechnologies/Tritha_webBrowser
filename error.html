<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Connection Error — Tritha Browser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#0f1117;color:#e2e8f0;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;}
  .card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:52px 60px;max-width:480px;}
  .icon{font-size:64px;margin-bottom:20px;}
  h1{font-size:24px;font-weight:700;margin-bottom:10px;color:#fff;}
  p{font-size:15px;color:#94a3b8;line-height:1.6;margin-bottom:28px;}
  button{background:#3b82f6;color:#fff;border:none;padding:13px 32px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:transform .15s,opacity .2s;}
  button:hover{opacity:.9;transform:translateY(-2px);}
  .url{font-size:12px;color:#475569;margin-top:20px;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>Cannot Reach Tritha</h1>
  <p>The Tritha panel is unreachable right now.<br>Check your internet connection and try again.</p>
  <button onclick="retry()">↺ Retry</button>
  <div class="url">panel.tritha.cloud</div>
</div>
<script>
function retry() { window.trithaBrowser ? window.trithaBrowser.retry() : location.reload(); }
</script>
</body>
</html>
